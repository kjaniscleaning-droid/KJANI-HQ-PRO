<body class="bg-[#05070a] text-white font-sans overflow-x-hidden">

        const { useState, useEffect } = React;
        const { Satellite, Search, Briefcase, Plus, LayoutDashboard, Loader2, MapPin } = lucide;

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyAPaLWV3QaIZOBdN0dzgB_9BIwEtNZM9BU",
            authDomain: "kjani-6a706.firebaseapp.com",
            projectId: "kjani-6a706",
            storageBucket: "kjani-6a706.firebasestorage.app",
            messagingSenderId: "62503034041",
            appId: "1:62503034041:web:e8ec81d1a96f38b8148f68"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // DEIN KEY HIER REIN FÜR ECHTE AUFTRÄGE
        const GEMINI_API_KEY = ""; 

        function App() {
            const [view, setView] = useState('radar');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);

            const scanForOrders = async () => {
                if (!GEMINI_API_KEY) {
                    alert("Boss, wir brauchen den Gemini API Key für echte Live-Daten!");
                    return;
                }
                setLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Suche 5 aktuelle Ausschreibungen oder Gesuche für Reinigungsfirmen in Hannover von heute. Gib Namen, Ortsteil und Art der Reinigung an." }] }]
                        })
                    });
                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    
                    // Speichern im System
                    await db.collection('auftraege_history').add({
                        content: text,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setResults([{ id: Date.now(), text: text }]);
                } catch (err) {
                    alert("Radar Fehler: Verbindung zum Satelliten unterbrochen.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen pb-40">
                    <header className="p-8 text-center">
                        <h1 className="text-4xl font-black italic tracking-tighter text-blue-500 uppercase">Kjani Radar</h1>
                        <p className="text-[10px] tracking-[0.5em] text-zinc-600 mt-2">HANNOVER SEKTOR SCANNER</p>
                    </header>

                    <main className="px-6 max-w-lg mx-auto">
                        {view === 'radar' ? (
                            <div className="space-y-8">
                                <div className="flex justify-center py-10">
                                    <div className={`w-32 h-32 rounded-full bg-blue-600/10 flex items-center justify-center border border-blue-500/20 ${loading ? 'radar-pulse' : ''}`}>
                                        <Satellite size={48} className={loading ? 'text-blue-400' : 'text-zinc-700'} />
                                    </div>
                                </div>

                                <button 
                                    onClick={scanForOrders}
                                    disabled={loading}
                                    className="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase tracking-widest shadow-lg shadow-blue-900/20 active:scale-95 transition-all"
                                >
                                    {loading ? 'Sektor wird gescannt...' : 'Live Scan Starten'}
                                </button>

                                <div className="space-y-4 mt-10">
                                    <h3 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-2">Ergebnisse</h3>
                                    {results.length === 0 ? (
                                        <div className="bg-[#121826] p-10 rounded-[2rem] border border-white/5 text-center italic text-zinc-600 text-sm">
                                            Warte auf Scan-Befehl...
                                        </div>
                                    ) : (
                                        results.map(res => (
                                            <div key={res.id} className="bg-[#121826] p-6 rounded-[2rem] border border-blue-500/20 shadow-xl">
                                                <div className="flex items-center gap-2 mb-4">
                                                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                                    <span className="text-[10px] font-bold text-green-500 uppercase">Live Fund</span>
                                                </div>
                                                <div className="text-sm text-zinc-300 leading-relaxed whitespace-pre-wrap">
                                                    {res.text}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-20 text-zinc-500 italic uppercase text-xs tracking-widest">
                                Dashboard wird synchronisiert...
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-[#121826]/90 backdrop-blur-xl border border-white/10 rounded-full p-4 flex justify-around items-center shadow-2xl">
                        <button onClick={() => setView('dashboard')} className={`p-4 rounded-2xl ${view === 'dashboard' ? 'text-blue-500 bg-blue-500/10' : 'text-zinc-600'}`}>
                            <LayoutDashboard size={24} />
                        </button>
                        <button className="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center shadow-xl shadow-blue-600/40">
                            <Plus size={32} strokeWidth={3} />
                        </button>
                        <button onClick={() => setView('radar')} className={`p-4 rounded-2xl ${view === 'radar' ? 'text-blue-500 bg-blue-500/10' : 'text-zinc-600'}`}>
                            <Satellite size={24} />
                        </button>
                    </nav>
                </div>
            );
        }
